<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="connection.css">
</head>
<body>
    <header class="navbar">
        <h1>Apply for Connection</h1>
    </header>

    <main class="container">
        <form class="connection-form">
            <h2>Apply for Electricity Connection</h2>
            
            <label for="consumer-name">
                Full Name
            </label>
            <input
                type="text"
                id="consumer-name"
                name="consumer-name"
                placeholder="Enter Your Name "
                required
            >
            <br>

            <label for="phone-number">
                Phone Number
            </label>
            <input
                type="tel"
                maxlength="10"
                id="phone-number"
                name="phone-number"
                placeholder="Enter Your Phone Number "
                required
            >
            <br>

            <label for="email">
                Email
            </label>
            <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter Your Email "
                required
            >
            <br>

            <label for="address">
                Address
            </label>
            <input
                type="text"
                id="address"
                name="address"
                placeholder="Enter Your Address "
                required
            >
            <br>

            <button type="submit">
                Submit
            </button>
            
        </form>
    </main>
</body>
</html>
