<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Electricity Bill</title>
    <link rel="stylesheet" href="pay-bills-style.css">
</head>
<body>

    <header class="navbar">
        <h1>MSEDCL Bill Payment</h1>
    </header>

    <main class="container">

        <form class="bill-form">

            <h2>Pay Your Electricity Bill</h2>

            <label for="consumer-number">
                Consumer Number
            </label>
            <input
                type="text"
                id="consumer-number"
                name="consumer-number"
                placeholder="Enter Consumer Number"
                required
            >

            <label for="name">
                Consumer Name
            </label>
            <input
                type="text"
                id="name"
                name="name"
                placeholder="Enter Your Name"
                required
            >

            <label for="amount">
                Bill Amount (₹)
            </label>
            <input
                type="number"
                id="amount"
                name="amount"
                placeholder="Enter Amount"
                required
            >

            <label for="payment-method">
                Payment Method
            </label>
            <select id="payment-method" name="payment-method">
                <option value"" disabled selected>Select Payment Method</option>
                <option>UPI</option>
                <option>Debit Card</option>
                <option>Credit Card</option>
                <option>Net Banking</option>
            </select>

            <button type="submit">
                Pay Now
            </button>

        </form>

    </main>

</body>
</html>
