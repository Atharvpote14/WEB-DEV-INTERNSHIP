<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Elements</title>
</head>
<body>

    <label for="fullname">Full Name:</label>
    <input
        type="text"
        id="fullname"
        name="fullname"
        placeholder="e.g. Atharv Pote"
        required
        minlength="2"
        maxlength="50"
    >

    <br><br>

    <label for="age">Age:</label>
    <input
        type="number"
        id="age"
        name="age"
        min="18"
        max="60"
        value="21"
    >

    <br><br>

    <label for="phone">Mobile Number:</label>
    <input
        type="tel"
        id="phone"
        name="phone"
        pattern="[0-9]{10}"
        placeholder="10-digit number"
    >


    <br><br>

    <label for="dob">Date of Birth:</label>
    <input
        type="date"
        id="dob"
        name="dob"
        min="1990-01-01"
        max="2008-12-31"
    >

</body>
</html>
