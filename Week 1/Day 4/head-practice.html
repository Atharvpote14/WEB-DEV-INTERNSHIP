<!DOCTYPE html>
<html lang = "en">
    <head>

        <!-- Defines the character encoding of document -->
        <meta charset = "UTF-8">

        <!-- Makes page responsive on all devices -->
        <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">

        <!-- Sets the page title -->
        <title>Atharv Pote | Web Developer</title>

        <!-- Provides summary of page for search engine -->
        <meta 
            name = "description"
            content = "Portfolio of Atharv Pote, a Computer Engineering student showcasing web development skills, projects, education, and contact information."
        >

        <!-- Identifies The author of the webpage -->
        <meta 
            name = "author"
            content = "Atharv Pote"
        >

        <!-- Tells search engines whether to index and follow links. -->
        <meta
            name = "robots"
            content = "index, follow"
        >

        <!-- Sets the browser theme color on supported devices. -->
        <meta
            name = "theme-color"
            content = "#2563eb"
        >

        <!-- Open Graph title used when sharing on social media -->
        <meta
            property = "og:title"
            content = "Atharv Pote | Web Developer"
        >

        <!-- Open Graph title used when sharing on social media -->
        <meta
            property = "og:description"
            content = "Explore Atharv Pote's portfolio featuring web development skills, projects, education, and contact details"
        >

        <!-- Open Graph image displayed in link previews -->
        <meta
            property = "og:image"
            content = "https://avatars.githubusercontent.com/u/223859743?s=400"
        >

        <!-- Open Graph URL representing the canonical page address -->
        <meta
            property = "og:url"
            content = "https://atharv.dev"
        >

        <!-- Open Graph content type of the page -->
         <meta
            property = "og:type"
            content = "website"
        >

        <!-- Specifies the Twitter card layout -->
        <meta
            name = "twitter:card"
            content = "summary_large_image"
        >

        <!-- Sets the Twitter preview title -->
        <meta
            name = "twitter:title"
            content = "Atharv Pote | Web Developer"
        >

        <!-- Sets the Twitter preview description -->
        <meta
            name = "twitter:description"
            content = "Portfolio showcasing skills, projects, education, and contact information"
        >

        <!-- Sets the Twitter preview image -->
        <meta
            name = "twitter:image"
            content = "https://avatars.githubusercontent.com/u/223859743?s=400"
        >
    </head>
    <body>
        <h1>This Web Page Has All Type's Of Meta Tags.</h1>
    </body>
</html>
