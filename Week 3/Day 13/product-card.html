<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Product Grid</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        /* bem card */

        .product-card{
            position:relative;
            background:#fff;
            border-radius:16px;
            overflow:hidden;
            border:1px solid #e5e7eb;
            transition:.3s;
            height:100%;
        }

        .product-card:hover{
            transform:translateY(-6px);
            box-shadow:0 12px 25px rgba(0,0,0,.12);
        }

        .product-card--featured{
            border:2px solid #f59e0b;
        }

        .product-card__image{
            height:220px;
            background:linear-gradient(135deg,#1d4ed8,#7c3aed);
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:4rem;
        }

        .product-card__badge{
            position:absolute;
            top:15px;
            left:15px;
            background:#ef4444;
            color:white;
            padding:4px 12px;
            border-radius:20px;
            font-size:.75rem;
            font-weight:700;
        }

        .product-card__badge--featured{
            left:auto;
            right:15px;
            background:#f59e0b;
            color:#111;
        }

        .product-card__body{
            padding:24px;
        }

        .product-card__category{
            text-transform:uppercase;
            color:#9ca3af;
            font-size:.75rem;
            letter-spacing:1px;
            margin-bottom:10px;
        }

        .product-card__title{
            font-size:1.5rem;
            font-weight:700;
            margin-bottom:10px;
        }

        .product-card__price{
            font-size:2rem;
            font-weight:700;
            margin-bottom:10px;
        }

        .product-card__old-price{
            color:#9ca3af;
            text-decoration:line-through;
            font-size:1rem;
            margin-left:10px;
        }

        .product-card__rating{
            color:#f59e0b;
            margin-bottom:20px;
        }

        .product-card__btn{
            width:100%;
        }
    </style>
</head>
<body>

<section class="py-5">
    <div class="container">

        <h1 class="display-5 fw-bold mb-3">
            E-commerce Product Card Grid
        </h1>

        <p class="lead text-muted mb-5">
            Bootstrap Grid + Custom BEM Product Cards
        </p>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">

            <div class="col">
                <article class="product-card">

                    <span class="product-card__badge">
                        -30%
                    </span>

                    <div class="product-card__image">
                        🎧
                    </div>

                    <div class="product-card__body">

                        <div class="product-card__category">
                            Audio
                        </div>

                        <h3 class="product-card__title">
                            Wireless ANC Headphones
                        </h3>

                        <div class="product-card__price">
                            ₹4,199
                            <span class="product-card__old-price">
                                ₹5,999
                            </span>
                        </div>

                        <div class="product-card__rating">
                            ★★★★★ (120)
                        </div>

                        <button class="btn btn-primary product-card__btn">
                            Add to Cart
                        </button>

                    </div>
                </article>
            </div>

            <div class="col">
                <article class="product-card product-card--featured">

                    <span class="product-card__badge product-card__badge--featured">
                        FEATURED
                    </span>

                    <div class="product-card__image">
                        ⌚
                    </div>

                    <div class="product-card__body">

                        <div class="product-card__category">
                            Wearables
                        </div>

                        <h3 class="product-card__title">
                            Smartwatch Pro Series
                        </h3>

                        <div class="product-card__price">
                            ₹8,499
                        </div>

                        <div class="product-card__rating">
                            ★★★★★ (281)
                        </div>

                        <button class="btn btn-primary product-card__btn">
                            Add to Cart
                        </button>

                    </div>
                </article>
            </div>

            <div class="col">
                <article class="product-card">

                    <div class="product-card__image">
                        📱
                    </div>

                    <div class="product-card__body">

                        <div class="product-card__category">
                            Accessories
                        </div>

                        <h3 class="product-card__title">
                            Phone Stand & Charger
                        </h3>

                        <div class="product-card__price">
                            ₹699
                        </div>

                        <div class="product-card__rating">
                            ★★★★☆ (48)
                        </div>

                        <button class="btn btn-outline-primary product-card__btn">
                            Add to Cart
                        </button>

                    </div>
                </article>
            </div>

        </div>

    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
