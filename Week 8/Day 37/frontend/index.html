<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <div class="header-content">
            <h1>🏫 Student Management</h1>
            <p>Perform all CRUD operations from your browser</p>
        </div>
    </header>

    <!-- ===== MAIN CONTAINER ===== -->
    <main class="container">

        <!-- ===== FORM CARD (Add / Edit) ===== -->
        <section class="card form-card">
            <h2 id="formTitle">Add New Student</h2>
            <form id="studentForm">

                <div class="form-group">
                    <label for="studentName">Student Name</label>
                    <input
                        type="text"
                        id="studentName"
                        placeholder="Enter full name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="studentMarks">Marks</label>
                    <input
                        type="number"
                        id="studentMarks"
                        placeholder="Enter marks (0–100)"
                        min="0"
                        max="100"
                        required
                    >
                </div>

                <!-- Hidden field to track edit mode -->
                <input type="hidden" id="editId" value="">

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        ➕ Add Student
                    </button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none;">
                        ❌ Cancel
                    </button>
                </div>

            </form>
        </section>

        <!-- ===== TABLE CARD (View / Search / Sort) ===== -->
        <section class="card table-card">

            <!-- Toolbar -->
            <div class="toolbar">
                <!-- Search -->
                <div class="search-box">
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="🔍 Search by name..."
                    >
                </div>

                <!-- Sort -->
                <div class="sort-box">
                    <label for="sortSelect">Sort by:</label>
                    <select id="sortSelect">
                        <option value="default">Default</option>
                        <option value="marks-asc">Marks ↑</option>
                        <option value="marks-desc">Marks ↓</option>
                    </select>
                </div>
            </div>

            <!-- Loading spinner -->
            <div id="loadingSpinner" class="loading-spinner" style="display:none;">
                <div class="spinner"></div>
                <p>Loading students...</p>
            </div>

            <!-- Empty state -->
            <div id="emptyState" class="empty-state" style="display:none;">
                <p>📭 No Students Found</p>
                <span>Add a student using the form above</span>
            </div>

            <!-- Students table -->
            <div class="table-wrapper" id="tableWrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Marks</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                        <!-- Rows injected by script.js -->
                    </tbody>
                </table>
            </div>

        </section>

        <!-- ===== NOTIFICATIONS ===== -->
        <div id="notificationContainer" class="notification-container">
            <!-- Toasts injected by script.js -->
        </div>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>Built with HTML · CSS · JavaScript · Fetch API</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
